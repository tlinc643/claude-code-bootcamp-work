<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="t d">
  <title id="t">CLAUDE.md cheat-sheet</title>
  <desc id="d">A file-card mock-up of CLAUDE.md showing five section headings — Project shape, Conventions, Tests, Don't, Glossary — each with a one-line description.</desc>
  <defs>
    <style>
      .ink { fill: #1B1B1F; }
      .muted { fill: #5A5A66; }
      .accent { fill: #D9531E; }
      .soft { fill: #FCE6DA; }
      .bg { fill: #FAF7F2; }
      .success { fill: #1F7A4D; }
      .stroke-ink { fill: none; stroke: #1B1B1F; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-accent { fill: none; stroke: #D9531E; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-muted { fill: none; stroke: #5A5A66; stroke-width: 1.5; stroke-dasharray: 4 4; }
      text { font-family: 'Inter Variable', Inter, Helvetica, Arial, sans-serif; }
      .h { font-weight: 700; font-size: 22px; fill: #1B1B1F; }
      .b { font-weight: 500; font-size: 16px; fill: #1B1B1F; }
      .s { font-weight: 600; font-size: 12px; fill: #5A5A66; letter-spacing: 0.1em; text-transform: uppercase; }
      .mono { font-family: 'JetBrains Mono Variable', ui-monospace, monospace; font-weight: 600; font-size: 14px; fill: #1B1B1F; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/>
    </marker>
  </defs>

  <text class="s" x="400" y="40" text-anchor="middle">CLAUDE.md · what to put in it</text>
  <g transform="translate(140,70)">
    <rect class="bg" width="520" height="340" rx="10"/>
    <rect class="stroke-ink" width="520" height="340" rx="10"/>
    <rect class="soft" width="520" height="44" rx="10"/>
    <text class="mono" x="20" y="30">CLAUDE.md</text>
    <line class="stroke-muted" x1="0" y1="44" x2="520" y2="44"/>

    <text class="b" x="24" y="80">## Project shape</text>
    <text class="b" x="44" y="104" fill="#5A5A66">Stack, top-level dirs, how to run</text>

    <text class="b" x="24" y="136">## Conventions</text>
    <text class="b" x="44" y="160" fill="#5A5A66">Naming, lint, error handling style</text>

    <text class="b" x="24" y="192">## Tests</text>
    <text class="b" x="44" y="216" fill="#5A5A66">Where they live, how to run one</text>

    <text class="b" x="24" y="248">## Don't</text>
    <text class="b" x="44" y="272" fill="#5A5A66">Files/areas Claude must not touch</text>

    <text class="b" x="24" y="304">## Glossary</text>
    <text class="b" x="44" y="328" fill="#5A5A66">Project-specific terms in one line each</text>
  </g>

</svg>
